<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>09 — Full Bottom Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Karla',sans-serif}
.lab{color:#666;font-size:12px;text-align:center;margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
.phone{width:375px;height:812px;background:#1a1a1a;border-radius:40px;position:relative;overflow:hidden;border:2px solid #2a2a2a;box-shadow:0 30px 80px rgba(0,0,0,.6)}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5}
.overlay-title{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;font-style:italic;color:#faf9f7;letter-spacing:-2px}
.overlay-hint{margin-top:40px;color:rgba(255,255,255,.18);font-size:11px;letter-spacing:2px;text-transform:uppercase}

.cig{position:absolute;bottom:260px;left:50%;transform:translateX(-50%);width:7px;height:220px;background:linear-gradient(to bottom,#f5f0e8 0%,#f5f0e8 84%,#c4a35a 84%);border-radius:1px}
.ember{position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:radial-gradient(circle,#ff6b35,#ff4500,transparent);border-radius:50%;box-shadow:0 0 10px #ff6b35,0 0 20px rgba(255,107,53,.3)}

/* Bottom sheet */
.sheet{position:absolute;bottom:0;left:0;right:0;z-index:10;background:#111;border-radius:16px 16px 0 0;border-top:1px solid rgba(255,255,255,.08)}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:10px auto 0}

/* Stats in sheet */
.sheet-stats{display:flex;justify-content:space-around;padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.ss{text-align:center}
.ss-val{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:#faf9f7}
.ss-lbl{font-size:8px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* Menu grid */
.sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;padding:16px 10px 40px}
.sg-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 0;cursor:pointer;transition:opacity .2s}
.sg-item:hover{opacity:.7}
.sg-icon{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center}
.sg-icon svg{width:18px;height:18px;stroke:#faf9f7;fill:none;stroke-width:1.5}
.sg-label{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.5px;text-align:center}

.note{position:absolute;top:50px;right:-170px;background:#22c55e;color:#fff;font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;white-space:nowrap;z-index:20}
.note::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:3px solid transparent;border-right-color:#22c55e}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<div class="lab">09 — Full Bottom Sheet</div>
<div class="phone">
  <div class="overlay">
    <div class="overlay-title">puff</div>
    <div class="overlay-hint">tap to light</div>
  </div>
  <div class="cig"><div class="ember"></div></div>

  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-stats">
      <div class="ss"><div class="ss-val">$24.50</div><div class="ss-lbl">saved</div></div>
      <div class="ss"><div class="ss-val">7</div><div class="ss-lbl">days</div></div>
      <div class="ss"><div class="ss-val">49</div><div class="ss-lbl">avoided</div></div>
    </div>
    <div class="sheet-grid">
      <div class="sg-item">
        <div class="sg-icon"><svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg></div>
        <div class="sg-label">Breathe</div>
      </div>
      <div class="sg-item">
        <div class="sg-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="sg-label">Log</div>
      </div>
      <div class="sg-item">
        <div class="sg-icon"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
        <div class="sg-label">Health</div>
      </div>
      <div class="sg-item">
        <div class="sg-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M16 13H8M16 17H8M10 9H8"/></svg></div>
        <div class="sg-label">Journal</div>
      </div>
      <div class="sg-item">
        <div class="sg-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06"/></svg></div>
        <div class="sg-label">Settings</div>
      </div>
      <div class="sg-item">
        <div class="sg-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></div>
        <div class="sg-label">Mood</div>
      </div>
      <div class="sg-item">
        <div class="sg-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <div class="sg-label">Notes</div>
      </div>
      <div class="sg-item">
        <div class="sg-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <div class="sg-label">Money</div>
      </div>
    </div>
  </div>
  <div class="note">sheet + icon grid</div>
</div>
</div>
</body>
</html>

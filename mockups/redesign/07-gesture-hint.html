<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>07 — Gesture Hints</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Manrope',sans-serif}
.lab{color:#666;font-size:12px;text-align:center;margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
.phone{width:375px;height:812px;background:#1a1a1a;border-radius:40px;position:relative;overflow:hidden;border:2px solid #2a2a2a;box-shadow:0 30px 80px rgba(0,0,0,.6)}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5}
.overlay-title{font-family:'EB Garamond',serif;font-size:46px;font-style:italic;color:#faf9f7;letter-spacing:-1px}
.overlay-hint{margin-top:40px;color:rgba(255,255,255,.18);font-size:11px;letter-spacing:2px;text-transform:uppercase}

.cig{position:absolute;bottom:200px;left:50%;transform:translateX(-50%);width:7px;height:240px;background:linear-gradient(to bottom,#f5f0e8 0%,#f5f0e8 84%,#c4a35a 84%);border-radius:1px}
.ember{position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:radial-gradient(circle,#ff6b35,#ff4500,transparent);border-radius:50%;box-shadow:0 0 10px #ff6b35,0 0 20px rgba(255,107,53,.3)}

/* Gesture hint pills */
.hint-top{position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:8px 16px}
.hint-top svg{width:14px;height:14px;stroke:rgba(255,255,255,.4);fill:none;stroke-width:1.5}
.hint-top span{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase}

.hint-left{position:absolute;top:50%;left:12px;transform:translateY(-50%) rotate(-90deg);z-index:10;font-size:9px;color:rgba(255,255,255,.2);letter-spacing:3px;text-transform:uppercase;white-space:nowrap}

.hint-right{position:absolute;top:50%;right:12px;transform:translateY(-50%) rotate(90deg);z-index:10;font-size:9px;color:rgba(255,255,255,.2);letter-spacing:3px;text-transform:uppercase;white-space:nowrap}

/* Stats bottom-left */
.stats-bl{position:absolute;bottom:40px;left:20px;z-index:10}
.stats-bl .sbl-money{font-family:'EB Garamond',serif;font-size:24px;font-weight:400;color:#faf9f7;letter-spacing:-.5px}
.stats-bl .sbl-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.stats-bl .sbl-sub strong{color:rgba(255,255,255,.6);font-weight:500}

/* Menu bottom-right */
.menu-br{position:absolute;bottom:40px;right:20px;z-index:10;display:flex;gap:8px}
.menu-br-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.menu-br-btn:hover{background:rgba(255,255,255,.1)}
.menu-br-btn svg{width:16px;height:16px;stroke:#faf9f7;fill:none;stroke-width:1.5}

.note{position:absolute;top:50px;right:-170px;background:#22c55e;color:#fff;font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;white-space:nowrap;z-index:20}
.note::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:3px solid transparent;border-right-color:#22c55e}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<div class="lab">07 — Gesture Hints + Corner Controls</div>
<div class="phone">
  <div class="overlay">
    <div class="overlay-title">puff</div>
    <div class="overlay-hint">tap to light</div>
  </div>
  <div class="cig"><div class="ember"></div></div>

  <div class="hint-top">
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    <span>swipe for menu</span>
    <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
  </div>

  <div class="hint-left">hold to smoke</div>
  <div class="hint-right">double tap = ash</div>

  <div class="stats-bl">
    <div class="sbl-money">$24.50</div>
    <div class="sbl-sub"><strong>7</strong> days &middot; <strong>49</strong> avoided</div>
  </div>

  <div class="menu-br">
    <div class="menu-br-btn">
      <svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg>
    </div>
    <div class="menu-br-btn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06"/></svg>
    </div>
  </div>
  <div class="note">gesture-driven</div>
</div>
</div>
</body>
</html>

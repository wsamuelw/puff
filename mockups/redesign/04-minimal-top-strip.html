<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>04 — Minimal Top Strip</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Outfit',sans-serif}
.lab{color:#666;font-size:12px;text-align:center;margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
.phone{width:375px;height:812px;background:#1a1a1a;border-radius:40px;position:relative;overflow:hidden;border:2px solid #2a2a2a;box-shadow:0 30px 80px rgba(0,0,0,.6)}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5}
.overlay-title{font-family:'Libre Baskerville',serif;font-size:40px;font-style:italic;color:#faf9f7;letter-spacing:-.5px}
.overlay-hint{margin-top:40px;color:rgba(255,255,255,.18);font-size:11px;letter-spacing:2px;text-transform:uppercase}

.cig{position:absolute;bottom:200px;left:50%;transform:translateX(-50%);width:7px;height:240px;background:linear-gradient(to bottom,#f5f0e8 0%,#f5f0e8 84%,#c4a35a 84%);border-radius:1px}
.ember{position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:radial-gradient(circle,#ff6b35,#ff4500,transparent);border-radius:50%;box-shadow:0 0 10px #ff6b35,0 0 20px rgba(255,107,53,.3)}

/* Top strip */
.top-strip{position:absolute;top:0;left:0;right:0;z-index:10;padding:52px 16px 0}
.strip-row{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px}
.strip-left{display:flex;align-items:center;gap:16px}
.strip-title{font-family:'Libre Baskerville',serif;font-size:16px;font-style:italic;color:#faf9f7}
.strip-dots{cursor:pointer;display:flex;gap:3px;padding:8px 4px}
.strip-dots span{display:block;width:3px;height:3px;background:rgba(255,255,255,.4);border-radius:50%}
.strip-money{font-family:'Libre Baskerville',serif;font-size:18px;color:#faf9f7;font-weight:400}

/* Dropdown menu (shown open) */
.dropdown{position:absolute;top:88px;left:16px;background:#222;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:6px 0;z-index:20;min-width:180px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.drop-item{display:flex;align-items:center;gap:12px;padding:12px 16px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer;transition:all .15s}
.drop-item:hover{background:rgba(255,255,255,.04);color:#faf9f7}
.drop-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5}
.drop-item.active{color:#faf9f7}
.drop-sep{height:1px;background:rgba(255,255,255,.06);margin:4px 16px}

/* Stats inline under title */
.stats-inline{position:absolute;top:88px;right:16px;display:flex;gap:12px;z-index:10}
.si-item{text-align:right}
.si-val{font-size:12px;font-weight:500;color:rgba(255,255,255,.6)}
.si-lbl{font-size:8px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1px}

.note{position:absolute;top:50px;right:-180px;background:#22c55e;color:#fff;font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;white-space:nowrap;z-index:30}
.note::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:3px solid transparent;border-right-color:#22c55e}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<div class="lab">04 — Minimal Top Strip + Dropdown</div>
<div class="phone">
  <div class="overlay">
    <div class="overlay-title">puff</div>
    <div class="overlay-hint">tap to light</div>
  </div>
  <div class="cig"><div class="ember"></div></div>

  <div class="top-strip">
    <div class="strip-row">
      <div class="strip-left">
        <div class="strip-title">puff</div>
        <div class="strip-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="strip-money">$24.50</div>
    </div>
  </div>

  <!-- Dropdown (shown open) -->
  <div class="dropdown">
    <div class="drop-item active">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Smoke
    </div>
    <div class="drop-item">
      <svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg>
      Breathing
    </div>
    <div class="drop-item">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Log Craving
    </div>
    <div class="drop-item">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Health
    </div>
    <div class="drop-item">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
      Journal
    </div>
    <div class="drop-sep"></div>
    <div class="drop-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </div>
  </div>

  <div class="stats-inline">
    <div class="si-item"><div class="si-val">7</div><div class="si-lbl">days</div></div>
    <div class="si-item"><div class="si-val">49</div><div class="si-lbl">avoided</div></div>
  </div>

  <div class="note">kebab dropdown</div>
</div>
</div>
</body>
</html>

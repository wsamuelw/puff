<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>06 — Corner Badge</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Space Mono',monospace}
.lab{color:#666;font-size:12px;text-align:center;margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
.phone{width:375px;height:812px;background:#1a1a1a;border-radius:40px;position:relative;overflow:hidden;border:2px solid #2a2a2a;box-shadow:0 30px 80px rgba(0,0,0,.6)}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5}
.overlay-title{font-family:'Crimson Pro',serif;font-size:44px;font-weight:300;font-style:italic;color:#faf9f7;letter-spacing:-1px}
.overlay-hint{margin-top:40px;color:rgba(255,255,255,.18);font-size:10px;letter-spacing:2px;text-transform:uppercase}

.cig{position:absolute;bottom:200px;left:50%;transform:translateX(-50%);width:7px;height:240px;background:linear-gradient(to bottom,#f5f0e8 0%,#f5f0e8 84%,#c4a35a 84%);border-radius:1px}
.ember{position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:radial-gradient(circle,#ff6b35,#ff4500,transparent);border-radius:50%;box-shadow:0 0 10px #ff6b35,0 0 20px rgba(255,107,53,.3)}

/* Top-left badge */
.badge{position:absolute;top:56px;left:16px;z-index:10;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 14px;min-width:120px}
.badge-label{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.badge-money{font-family:'Crimson Pro',serif;font-size:22px;font-weight:300;color:#faf9f7;letter-spacing:-.5px}
.badge-row{display:flex;gap:10px;margin-top:6px}
.badge-item{font-size:10px;color:rgba(255,255,255,.5)}
.badge-item strong{color:#faf9f7}

/* Top-right menu icon */
.menu-icon{position:absolute;top:56px;right:16px;z-index:10;width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.menu-icon:hover{background:rgba(255,255,255,.08)}
.menu-icon svg{width:18px;height:18px;stroke:#faf9f7;fill:none;stroke-width:1.5}

/* Dropdown (shown) */
.dropdown{position:absolute;top:104px;right:16px;background:#222;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:4px 0;z-index:20;min-width:160px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.drop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;transition:all .15s;font-family:'Space Mono',monospace}
.drop-item:hover{background:rgba(255,255,255,.04);color:#faf9f7}
.drop-item svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5}
.drop-sep{height:1px;background:rgba(255,255,255,.06);margin:3px 14px}

.note{position:absolute;top:50px;right:-160px;background:#22c55e;color:#fff;font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;white-space:nowrap;z-index:30}
.note::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:3px solid transparent;border-right-color:#22c55e}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<div class="lab">06 — Corner Badge + Icon</div>
<div class="phone">
  <div class="overlay">
    <div class="overlay-title">puff</div>
    <div class="overlay-hint">tap to light</div>
  </div>
  <div class="cig"><div class="ember"></div></div>

  <div class="badge">
    <div class="badge-label">saved</div>
    <div class="badge-money">$24.50</div>
    <div class="badge-row">
      <div class="badge-item"><strong>7</strong>d</div>
      <div class="badge-item"><strong>49</strong> avoided</div>
    </div>
  </div>

  <div class="menu-icon">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.5" fill="currentColor" stroke="none"/></svg>
  </div>

  <div class="dropdown">
    <div class="drop-item"><svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg>Breathing</div>
    <div class="drop-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Log</div>
    <div class="drop-item"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Health</div>
    <div class="drop-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M16 13H8M16 17H8M10 9H8"/></svg>Journal</div>
    <div class="drop-sep"></div>
    <div class="drop-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06"/></svg>Settings</div>
  </div>
  <div class="note">badge + vert dots</div>
</div>
</div>
</body>
</html>

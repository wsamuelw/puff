<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 — Bottom Pill Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'DM Sans',sans-serif}
.lab{color:#666;font-size:12px;text-align:center;margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
.phone{width:375px;height:812px;background:#1a1a1a;border-radius:40px;position:relative;overflow:hidden;border:2px solid #2a2a2a;box-shadow:0 30px 80px rgba(0,0,0,.6)}

/* Overlay */
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5}
.overlay-title{font-family:'Playfair Display',serif;font-size:42px;font-style:italic;color:#faf9f7;letter-spacing:-1px;margin-bottom:6px}
.overlay-sub{color:rgba(255,255,255,.35);font-size:12px;letter-spacing:3px;text-transform:uppercase}
.overlay-hint{margin-top:40px;color:rgba(255,255,255,.2);font-size:11px;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.overlay-hint .flame{display:inline-block;width:8px;height:12px;background:linear-gradient(to top,#ff6b35,#ffcc00);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;animation:flicker .8s ease-in-out infinite alternate}
@keyframes flicker{0%{opacity:.7;transform:scaleX(.9)}100%{opacity:1;transform:scaleX(1.1)}}

/* Cigarette */
.cig{position:absolute;bottom:200px;left:50%;transform:translateX(-50%);width:7px;height:240px;background:linear-gradient(to bottom,#f5f0e8 0%,#f5f0e8 84%,#c4a35a 84%);border-radius:1px}
.ember{position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:radial-gradient(circle,#ff6b35,#ff4500,transparent);border-radius:50%;box-shadow:0 0 10px #ff6b35,0 0 20px rgba(255,107,53,.3)}

/* Bottom pill */
.bottom-pill{position:absolute;bottom:0;left:0;right:0;z-index:10}
.pill-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:8px auto 0}
.pill-bar{display:flex;align-items:center;justify-content:space-around;padding:14px 20px 40px;background:rgba(26,26,26,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06)}
.pill-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:rgba(255,255,255,.5);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:color .2s}
.pill-item:hover{color:#faf9f7}
.pill-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.pill-item.active{color:#faf9f7}
.pill-item.active::after{content:'';display:block;width:3px;height:3px;background:#faf9f7;border-radius:50%;margin-top:2px}

/* Stats strip */
.stats-strip{position:absolute;bottom:110px;left:20px;right:20px;display:flex;justify-content:space-between;padding:10px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;z-index:10}
.stat{text-align:center}
.stat-val{font-size:15px;font-weight:600;color:#faf9f7;font-family:'DM Sans',sans-serif}
.stat-lbl{font-size:8px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.stat-money .stat-val{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;letter-spacing:-.5px}
.stat-divider{width:1px;background:rgba(255,255,255,.08)}

/* Annotation */
.note{position:absolute;top:50px;right:-190px;background:#22c55e;color:#fff;font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;white-space:nowrap;z-index:20}
.note::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:3px solid transparent;border-right-color:#22c55e}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<div class="lab">01 — Bottom Pill Tab Bar</div>
<div class="phone">
  <div class="overlay">
    <div class="overlay-title">puff</div>
    <div class="overlay-sub">your quit companion</div>
    <div class="overlay-hint"><span class="flame"></span> tap to light</div>
  </div>
  <div class="cig"><div class="ember"></div></div>

  <div class="stats-strip">
    <div class="stat stat-money"><div class="stat-val">$24.50</div><div class="stat-lbl">saved</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-val">7</div><div class="stat-lbl">days</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-val">49</div><div class="stat-lbl">avoided</div></div>
  </div>

  <div class="bottom-pill">
    <div class="pill-handle"></div>
    <div class="pill-bar">
      <div class="pill-item active">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Smoke
      </div>
      <div class="pill-item">
        <svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg>
        Breathing
      </div>
      <div class="pill-item">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Log
      </div>
      <div class="pill-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        More
      </div>
    </div>
  </div>
  <div class="note">bottom tab bar</div>
</div>
</div>
</body>
</html>

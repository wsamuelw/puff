<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03 — Side Drawer</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Karla',sans-serif}
.lab{color:#666;font-size:12px;text-align:center;margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
.phone{width:375px;height:812px;background:#1a1a1a;border-radius:40px;position:relative;overflow:hidden;border:2px solid #2a2a2a;box-shadow:0 30px 80px rgba(0,0,0,.6)}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5}
.overlay-title{font-family:'Bodoni Moda',serif;font-size:48px;font-style:italic;color:#faf9f7;letter-spacing:-1px}
.overlay-hint{margin-top:40px;color:rgba(255,255,255,.2);font-size:11px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.overlay-hint .flame{display:inline-block;width:6px;height:10px;background:linear-gradient(to top,#ff6b35,#ffcc00);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;animation:flicker .8s ease-in-out infinite alternate}
@keyframes flicker{0%{opacity:.7;transform:scaleX(.9)}100%{opacity:1;transform:scaleX(1.1)}}

.cig{position:absolute;bottom:200px;left:50%;transform:translateX(-50%);width:7px;height:240px;background:linear-gradient(to bottom,#f5f0e8 0%,#f5f0e8 84%,#c4a35a 84%);border-radius:1px}
.ember{position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:radial-gradient(circle,#ff6b35,#ff4500,transparent);border-radius:50%;box-shadow:0 0 10px #ff6b35,0 0 20px rgba(255,107,53,.3)}

/* Hamburger */
.hamburger{position:absolute;top:60px;left:20px;z-index:20;cursor:pointer;padding:8px}
.hamburger svg{width:20px;height:16px;stroke:#faf9f7;fill:none;stroke-width:1.5}

/* Drawer overlay */
.drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:30;opacity:1}
.drawer{position:absolute;top:0;left:0;bottom:0;width:280px;background:#111;z-index:31;padding:80px 30px 40px;border-right:1px solid rgba(255,255,255,.06)}
.drawer-brand{font-family:'Bodoni Moda',serif;font-size:28px;font-style:italic;color:#faf9f7;margin-bottom:40px;letter-spacing:-1px}
.drawer-items{display:flex;flex-direction:column;gap:0}
.drawer-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;transition:color .2s}
.drawer-item:hover{color:#faf9f7}
.drawer-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5}
.drawer-item.active{color:#faf9f7}

/* Stats in drawer */
.drawer-stats{margin-top:auto;padding-top:30px;border-top:1px solid rgba(255,255,255,.06)}
.drawer-stats-label{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.drawer-stats-row{display:flex;gap:20px}
.drawer-stat-val{font-family:'Bodoni Moda',serif;font-size:20px;color:#faf9f7;font-weight:400}
.drawer-stat-lbl{font-size:8px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* Dark mode toggle in drawer */
.drawer-toggle{display:flex;align-items:center;justify-content:space-between;padding:14px 0;margin-top:10px;border-top:1px solid rgba(255,255,255,.04)}
.drawer-toggle-label{color:rgba(255,255,255,.6);font-size:14px}
.toggle-pill{width:40px;height:22px;background:rgba(255,255,255,.15);border-radius:11px;position:relative;cursor:pointer}
.toggle-pill::after{content:'';position:absolute;top:3px;right:3px;width:16px;height:16px;background:#faf9f7;border-radius:50%}

.note{position:absolute;top:50px;right:-130px;background:#22c55e;color:#fff;font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;white-space:nowrap;z-index:40}
.note::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:3px solid transparent;border-right-color:#22c55e}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
<div class="lab">03 — Side Drawer</div>
<div class="phone">
  <div class="overlay">
    <div class="overlay-title">puff</div>
    <div class="overlay-hint"><span class="flame"></span> tap to light</div>
  </div>
  <div class="cig"><div class="ember"></div></div>

  <div class="hamburger">
    <svg viewBox="0 0 20 16"><line x1="0" y1="1" x2="20" y2="1"/><line x1="0" y1="8" x2="14" y2="8"/><line x1="0" y1="15" x2="18" y2="15"/></svg>
  </div>

  <!-- Drawer (shown open) -->
  <div class="drawer-bg"></div>
  <div class="drawer">
    <div class="drawer-brand">puff</div>
    <div class="drawer-items">
      <div class="drawer-item active">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Smoke
      </div>
      <div class="drawer-item">
        <svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg>
        Breathing
      </div>
      <div class="drawer-item">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Log Craving
      </div>
      <div class="drawer-item">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Health
      </div>
      <div class="drawer-item">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
        Journal
      </div>
    </div>

    <div class="drawer-stats">
      <div class="drawer-stats-label">your progress</div>
      <div class="drawer-stats-row">
        <div><div class="drawer-stat-val">$24.50</div><div class="drawer-stat-lbl">saved</div></div>
        <div><div class="drawer-stat-val">7d</div><div class="drawer-stat-lbl">streak</div></div>
        <div><div class="drawer-stat-val">49</div><div class="drawer-stat-lbl">avoided</div></div>
      </div>
    </div>

    <div class="drawer-toggle">
      <span class="drawer-toggle-label">Dark mode</span>
      <div class="toggle-pill"></div>
    </div>
  </div>
  <div class="note">slide-in drawer</div>
</div>
</div>
</body>
</html>
